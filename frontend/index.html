<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncFit Access</title>
    <meta name="description" content="SyncFit - The Frictionless Gym Ecosystem">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-container"></div>
    <div class="overlay"></div>
    
    <main class="auth-container">
        <!-- Login Form -->
        <div class="auth-panel" id="login-panel">
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                </div>
                <h1>SyncFit</h1>
            </div>
            <h2>Secure Access</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn primary-btn">Log In</button>
            </form>
            <p class="switch-mode">New to SyncFit? <a href="#" id="to-signup">Sign Up</a></p>
        </div>

        <!-- Sign Up Form -->
        <div class="auth-panel hidden" id="signup-panel">
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                </div>
                <h1>SyncFit</h1>
            </div>
            <h2>Create Account</h2>
            <form id="signup-form">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Create a password">
                </div>
                <div class="input-group highlight-group">
                    <label for="signup-gym-id">Gym ID <span class="required">*</span></label>
                    <input type="text" id="signup-gym-id" required placeholder="Provided by your gym">
                    <small class="help-text">Required for Biometric & NFC Sync</small>
                </div>
                <button type="submit" class="btn primary-btn">Sign Up</button>
            </form>
            <p class="switch-mode">Already registered? <a href="#" id="to-login">Log In</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
